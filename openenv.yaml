# OpenEnv Environment Manifest
#
# This file declares the environment's runtime configuration for the OpenEnv
# framework. It is consumed by `openenv validate`, `openenv serve`, and the
# hackathon's automated Phase 2 validator pipeline.
#
# Reference: https://github.com/meta-pytorch/OpenEnv
#
# Fields:
#   spec_version  – Schema version of this manifest (currently 1).
#   name          – Unique environment identifier; must match the HF Space slug.
#   type          – Deployment target. "space" = Hugging Face Spaces.
#   runtime       – Server framework. "fastapi" enables HTTP + WebSocket.
#   app           – Python import path to the ASGI application object.
#   port          – Port the container exposes for inbound traffic.

spec_version: 1
name: agentic-sysadmin
type: space
runtime: fastapi
app: server.app:app
port: 7860
